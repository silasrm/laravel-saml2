name: PHPUnit tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [master]
    paths:
      - "**/*.php"
      - "composer.json"
      - "composer.lock"
      - "phpunit.xml.dist"
      - ".github/workflows/pr-phpunit-tests.yml"
      - ".github/actions/prepare-php-environment/action.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  phpunit-tests:
    name: PHPUnit - Laravel ${{ matrix.laravel }} / PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ !(github.event.pull_request.draft || startsWith(github.head_ref, 'code-style-fix/')) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - laravel: '9'
            php: '8.2'
            illuminate: '^9.0'
            testbench: '^7.0'
            phpunit: '^10.5'
          - laravel: '9'
            php: '8.3'
            illuminate: '^9.0'
            testbench: '^7.0'
            phpunit: '^10.5'
          - laravel: '9'
            php: '8.4'
            illuminate: '^9.0'
            testbench: '^7.0'
            phpunit: '^10.5'
          - laravel: '9'
            php: '8.5'
            illuminate: '^9.0'
            testbench: '^7.0'
            phpunit: '^10.5'
          - laravel: '10'
            php: '8.2'
            illuminate: '^10.0'
            testbench: '^8.0'
            phpunit: '^10.5'
          - laravel: '10'
            php: '8.3'
            illuminate: '^10.0'
            testbench: '^8.0'
            phpunit: '^10.5'
          - laravel: '10'
            php: '8.4'
            illuminate: '^10.0'
            testbench: '^8.0'
            phpunit: '^10.5'
          - laravel: '10'
            php: '8.5'
            illuminate: '^10.0'
            testbench: '^8.0'
            phpunit: '^10.5'
          - laravel: '11'
            php: '8.2'
            illuminate: '^11.0'
            testbench: '^9.0'
            phpunit: '^11.5'
          - laravel: '11'
            php: '8.3'
            illuminate: '^11.0'
            testbench: '^9.0'
            phpunit: '^11.5'
          - laravel: '11'
            php: '8.4'
            illuminate: '^11.0'
            testbench: '^9.0'
            phpunit: '^11.5'
          - laravel: '11'
            php: '8.5'
            illuminate: '^11.0'
            testbench: '^9.0'
            phpunit: '^11.5'
          - laravel: '12'
            php: '8.3'
            illuminate: '^12.0'
            testbench: '^10.0'
            phpunit: '^11.5'
          - laravel: '12'
            php: '8.2'
            illuminate: '^12.0'
            testbench: '^10.0'
            phpunit: '^11.5'
          - laravel: '12'
            php: '8.4'
            illuminate: '^12.0'
            testbench: '^10.0'
            phpunit: '^11.5'
          - laravel: '12'
            php: '8.5'
            illuminate: '^12.0'
            testbench: '^10.0'
            phpunit: '^11.5'
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Prepare PHP Environment - PHP v${{ matrix.php }}
        uses: ./.github/actions/prepare-php-environment/
        with:
          PHP_VERSION: ${{ matrix.php }}

      - name: Resolve dependencies for Laravel ${{ matrix.laravel }}
        run: >
          composer update --no-interaction --prefer-dist --with-all-dependencies
          --with "illuminate/console:${{ matrix.illuminate }}"
          --with "illuminate/database:${{ matrix.illuminate }}"
          --with "illuminate/support:${{ matrix.illuminate }}"
          --with "orchestra/testbench:${{ matrix.testbench }}"
          --with "phpunit/phpunit:${{ matrix.phpunit }}"

      - name: Run PHPUnit - Laravel ${{ matrix.laravel }}
        run: |
          php ./vendor/bin/phpunit --colors="always"
