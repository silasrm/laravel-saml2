name: PHPUnit tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [master]
    paths:
      - "**/*.php"
      - "composer.json"
      - "composer.lock"
      - "phpunit.xml.dist"
      - ".github/workflows/pr-phpunit-tests.yml"
      - ".github/actions/prepare-php-environment/action.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  phpunit-tests:
    name: PHPUnit Tests - PHP v${{ matrix.PHP_VERSION }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ !(github.event.pull_request.draft || startsWith(github.head_ref, 'code-style-fix/')) }}
    strategy:
      fail-fast: false
      matrix:
        PHP_VERSION: [ '7.1', '7.2', '7.3', '7.4', '8.0', '8.1', '8.2', '8.3', '8.4' ]
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Prepare PHP Environment - PHP v${{ matrix.PHP_VERSION }}
        uses: ./.github/actions/prepare-php-environment/
        with:
          PHP_VERSION: ${{ matrix.PHP_VERSION }}

      - name: Install composer dependencies
        uses: ramsey/composer-install@v3

      - name: Unit Tests - PHP v${{ matrix.PHP_VERSION }}
        run: |
          php ./vendor/bin/phpunit --colors="always"
